name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.0)'
        required: true
        default: 'v1.2.0'

jobs:
  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Test
      run: dotnet test --no-build -c Release

    - name: Pack
      run: |
        # 手動実行時は inputs.tag、タグプッシュ時は GITHUB_REF_NAME を使用
        VERSION="${{ github.event.inputs.tag }}"
        if [ -z "$VERSION" ]; then
          VERSION="${GITHUB_REF_NAME#v}"
        else
          VERSION="${VERSION#v}"
        fi
        echo "Packaging version: $VERSION"
        dotnet pack --no-build -c Release -o out /p:Version=$VERSION

    - name: Push to NuGet
      run: dotnet nuget push out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Push to GitHub Packages
      run: dotnet nuget push out/*.nupkg --source "github" --skip-duplicate
